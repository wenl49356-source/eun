<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Launcher Pro</title>
    <style>
        :root {
            --bg-color: #FFFFFF; 
            --glass-bg: rgba(255, 255, 255, 0.75); 
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-main: #000000;
            --accent-blue: #0A84FF;
            --dock-bg: rgba(0, 0, 0, 0.05);
            --kakao-yellow: #FEE500;
            --kakao-chat-bg: #BACEE0;
            /* 默认头像链接 */
            --default-avatar: url('https://api.minimalavatars.com/avatar/default/png'); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            background-size: cover; background-position: center; background-attachment: fixed;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            color: var(--text-main);
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        .top-spacer { height: 20px; flex-shrink: 0; }

        /* 页面管理 */
        .page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; z-index: 10; overflow-y: auto; padding-bottom: 120px; background: white; }
        .active { display: flex; }
        #home { background: transparent; }

        /* --- 主页名片区 --- */
        .profile-card {
            width: 90%; margin: 10px auto 20px;
            background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 30px; border: 1px solid var(--glass-border);
            box-shadow: 0 8px 25px rgba(0,0,0,0.03);
            display: flex; flex-direction: column; align-items: center; padding-bottom: 20px; overflow: hidden;
        }
        .header-banner { width: 100%; height: 140px; background-image: url('https://images.unsplash.com/photo-1518173946687-a4c8a9b749f5?q=80&w=1000'); background-size: cover; background-position: center; cursor: pointer; }
        .avatar-container { width: 80px; height: 80px; margin-top: -40px; border-radius: 50%; padding: 3px; background: rgba(255, 255, 255, 0.9); }
        .avatar { width: 100%; height: 100%; border-radius: 50%; background-size: cover; background-position: center; cursor: pointer; background-image: var(--default-avatar); }
        .profile-info { text-align: center; margin-top: 8px; width: 100%; padding: 0 15px; }
        .editable { cursor: pointer; outline: none; border-radius: 4px; display: inline-block; }
        .nickname { font-size: 19px; font-weight: 800; font-family: "Georgia", serif; display: block; }
        .user-id { font-size: 11px; color: #AAA; margin-bottom: 8px; display: block; }
        .bio { font-size: 12.5px; color: #555; margin-bottom: 6px; display: block; font-weight: 500; }
        .location-container { display: flex; align-items: center; justify-content: center; gap: 4px; color: #999; }
        .location-container svg { width: 12px; height: 12px; fill: currentColor; }
        .location { font-size: 10.5px; display: block; }

        /* --- 主页布局 --- */
        .home-main-layout { display: grid; grid-template-columns: 1.1fr 1fr; gap: 15px; padding: 0 5%; align-items: stretch; }
        .chat-widget { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 28px; padding: 18px 12px; display: flex; flex-direction: column; justify-content: center; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .bubble { font-size: 11px; padding: 10px 14px; border-radius: 18px; max-width: 85%; line-height: 1.4; outline: none; position: relative; }
        .bubble-gray { background: #EBEBEB; color: #444; align-self: flex-start; border-bottom-left-radius: 4px; }
        .bubble-white { background: #FFFFFF; color: #000; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        .icon-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .app-item { display: flex; flex-direction: column; align-items: center; }
        .icon-box { width: 62px; height: 62px; background-color: #F8F8F8; border-radius: 20px; display: flex; justify-content: center; align-items: center; border: 1px solid rgba(0,0,0,0.04); overflow: hidden; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.02); background-size: cover; background-position: center; }
        .icon-box svg { width: 28px; height: 28px; stroke: #333; stroke-width: 1.5; fill: none; }
        .app-name { font-size: 11px; text-align: center; font-weight: 600; color: #444; margin-top: 6px; }

        /* 底部互动框 */
        .home-footer-widget {
            width: 90%; margin: 25px auto 0;
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 22px;
            padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }
        .widget-left { display: flex; flex-direction: column; gap: 2px; }
        .widget-text { font-size: 11px; font-weight: 600; color: #333; outline: none; }
        .widget-subtext { font-size: 9px; color: #999; outline: none; }
        .widget-actions { display: flex; gap: 12px; align-items: center; }
        .widget-action-item { display: flex; align-items: center; gap: 4px; color: #555; font-size: 10px; font-weight: 500; outline: none; }
        .widget-action-item svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2; fill: none; }

        /* --- KakaoTalk 页面样式 --- */
        .kakao-header-v2 {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            background: white; position: sticky; top: 0; z-index: 100;
        }
        .kakao-header-v2 .title { font-size: 24px; font-weight: 800; color: #000; letter-spacing: -0.5px; }
        .kakao-header-v2 .icons { display: flex; gap: 18px; align-items: center; }
        .kakao-header-v2 .icons svg { width: 22px; height: 22px; stroke: #000; fill: none; stroke-width: 1.8; }

        .kakao-profile-section {
            padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
        }
        .kakao-profile-section .user-info { display: flex; align-items: center; gap: 15px; }
        .kakao-profile-section .ava { width: 65px; height: 65px; border-radius: 26px; background-size: cover; background-position: center; background-image: var(--default-avatar); cursor: pointer; }
        .kakao-profile-section .name { font-size: 20px; font-weight: 700; color: #000; }
        .kakao-profile-section .profile-plus { 
            padding: 4px 12px; border: 1px solid #E0E0E0; border-radius: 15px; font-size: 13px; font-weight: 500; color: #666; 
        }

        .kakao-divider { height: 1px; background: #F3F3F3; margin: 0 20px; }

        .kakao-list-group { padding: 15px 20px 5px; display: flex; justify-content: space-between; align-items: center; }
        .kakao-list-group span { font-size: 13px; color: #8C8C8C; font-weight: 500; }
        .kakao-list-group svg { width: 14px; height: 14px; stroke: #8C8C8C; fill: none; }

        .kakao-item { display: flex; align-items: center; gap: 12px; padding: 10px 20px; cursor: pointer; }
        .kakao-item .icon-box-k { width: 44px; height: 44px; border-radius: 16px; background: #EEE; display: flex; justify-content: center; align-items: center; overflow: hidden; background-size: cover; background-position: center; }
        .kakao-item .icon-yellow { background: #FEE500; }
        .kakao-item .icon-yellow svg { width: 22px; height: 22px; fill: #3C1E1E; }
        .kakao-item .content-k { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .kakao-item .name-k { font-size: 15px; font-weight: 600; color: #000; margin-bottom: 2px; }
        .kakao-item .status-k { font-size: 12px; color: #8C8C8C; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 220px; }
        .kakao-item .chevron-k { width: 16px; height: 16px; stroke: #E0E0E0; fill: none; }

        /* Kakao 底部导航 */
        .kakao-nav-v2 {
            height: 60px; border-top: 1px solid #F0F0F0; display: flex; background: #FFF; 
            position: fixed; bottom: 0; width: 100%; z-index: 300; padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-tab-v2 { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; color: #000; }
        .nav-tab-v2 svg { width: 26px; height: 26px; fill: currentColor; }
        .nav-tab-v2.dimmed { color: #CCCCCC; }
        .nav-tab-v2 .dot-nav { width: 26px; height: 26px; display: flex; gap: 3px; justify-content: center; align-items: center; }
        .nav-tab-v2 .dot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; }

        /* 通用设置页 */
        .settings-page { background: #F2F2F7; }
        .input-card { background: white; border-radius: 15px; padding: 5px; margin: 12px 15px; border: 1px solid #DDD; }
        .input-row { padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid #EEE; }
        .save-btn { background: var(--accent-blue); color: white; text-align: center; padding: 15px; border-radius: 15px; font-weight: 600; cursor: pointer; margin: 20px 15px; }
        .back-link { color: #000; padding: 15px; display: flex; align-items: center; cursor: pointer; font-weight: 500; font-size: 14px; }
        .back-link svg { width: 20px; height: 20px; margin-right: 2px; stroke: currentColor; stroke-width: 2.5; fill: none; }
        
        .chat-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--kakao-chat-bg); z-index: 500; display: none; flex-direction: column; }
        .chat-view-header { background: var(--kakao-chat-bg); padding: 15px; display: flex; align-items: center; justify-content: space-between; }
        .chat-view-content { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .msg-wrap { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; }
        .msg-right { align-self: flex-end; flex-direction: row-reverse; }
        .msg-bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.4; background: white; color: black; }
        .msg-right .msg-bubble { background: var(--kakao-yellow); }
        .chat-input-bar { background: white; padding: 10px 15px; display: flex; align-items: center; gap: 10px; padding-bottom: env(safe-area-inset-bottom); }
        .chat-input { flex: 1; background: #F5F5F5; border: none; padding: 10px 15px; border-radius: 20px; outline: none; }

        .dock-container { position: fixed; bottom: 25px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 100; }
        .dock { width: 92%; height: 85px; background-color: var(--dock-bg); backdrop-filter: blur(30px); border-radius: 28px; display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(0,0,0,0.05); }
        .dock-item { width: 50px; height: 50px; border-radius: 14px; background-color: rgba(0,0,0,0.05); display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .dock-item svg { width: 24px; height: 24px; stroke: #333; stroke-width: 1.8; fill: none; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <input type="file" id="file-input" onchange="handleFile(event)">
    <div class="top-spacer"></div>

    <!-- 主页 -->
    <div id="home" class="page active">

        <div class="home-main-layout">

            <div class="icon-grid">

                <div class="app-item" onclick="showPage('theme')"><div class="icon-box"><svg viewBox="0 0 24 24"><path d="m12 3 1.912 5.886h6.19l-5.007 3.638L17.007 18.41 12 14.772l-5.007 3.638 1.912-5.886-5.007-3.638h6.19z"/></svg></div><span class="app-name">美化</span></div>

        </div>

        <div class="home-footer-widget">

                <div class="widget-text" contenteditable="true">Share your vibes.</div>
                <div class="widget-subtext" contenteditable="true">2 minutes ago</div>
            </div>

        </div></div>

            </div>
            <div class="nav-tab-v2 dimmed" onclick="switchKTab('calls')">
                <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.81 12.81 0 0 0 .62 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.62A2 2 0 0 1 22 16.92z"></path></svg>
            </div>
            <div class="nav-tab-v2 dimmed" onclick="switchKTab('more')">
                <div class="dot-nav"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            </div>
        </div>
    </div>

    <!-- 聊天页面 -->
    <div id="chat-view" class="chat-view">
        <div class="chat-view-header">
            <div class="back-link" onclick="closeChat()"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg><span style="font-weight:700;">sung^min</span></div>
            <svg viewBox="0 0 24 24" style="width:22px; stroke:#000; fill:none;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </div>
        <div id="chat-content" class="chat-view-content">
            <div class="msg-wrap msg-left"><div class="msg-bubble">你好呀！最近过得怎么样？</div></div>
        </div>
        <div class="chat-input-bar">
            <div style="font-size: 24px;">+</div>
            <input type="text" id="chat-input" class="chat-input" placeholder="输入消息...">
            <div style="font-size: 24px;" onclick="sendMessage()">⬆️</div>
        </div>
    </div>

    <!-- 设置 -->
    <div id="settings" class="page settings-page">
        <div class="back-link" onclick="showPage('home')"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>返回</div>
        <div class="input-card"><div class="input-row"><label>API Key</label><input type="password" id="api-key" placeholder="sk-..."></div></div>
        <div class="save-btn" onclick="showPage('home')">保存配置</div>
    </div>

    <!-- 美化 -->
    <div id="theme" class="page settings-page">
        <div class="back-link" onclick="showPage('home')"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>返回</div>
        <div class="input-card"><div class="input-row" onclick="triggerThemeAction('wallpaper')"><label>修改手机壁纸</label><span>＞</span></div></div>
    </div>

    <script>
        let themeTarget = null;
        // 使用用户上传的头像作为变量
        const DEFAULT_AVATAR_PATH = '微信图片_20260307234707_22_2.jpg';

        function showPage(p) { 
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active')); 
            document.getElementById(p).classList.add('active'); 
        }

        function openChat(id) { 
            document.getElementById('chat-view').style.display = 'flex'; 
        }

        function closeChat() { 
            document.getElementById('chat-view').style.display = 'none'; 
        }
        
        function switchKTab(tabName) {
            console.log("Switching to Kakao tab:", tabName);
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            if(!input.value.trim()) return;
            const content = document.getElementById('chat-content');
            content.innerHTML += `<div class="msg-wrap msg-right"><div class="msg-bubble">${input.value}</div></div>`;
            input.value = "";
            content.scrollTop = content.scrollHeight;
        }

        function triggerPhoto(id) { 
            themeTarget = id; 
            document.getElementById('file-input').click(); 
        }

        function triggerThemeAction(id) { 
            themeTarget = id; 
            document.getElementById('file-input').click(); 
        }

        function handleFile(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const imgData = ev.target.result;
                if(themeTarget === 'wallpaper') {
                    document.body.style.backgroundImage = `url(${imgData})`;
                } else if(themeTarget === 'avatar-img') {
                    document.getElementById('avatar-img').style.backgroundImage = `url(${imgData})`;
                    document.getElementById('k-my-ava').style.backgroundImage = `url(${imgData})`;
                    // 更新 CSS 变量
                    document.documentElement.style.setProperty('--default-avatar', `url(${imgData})`);
                } else if(themeTarget === 'banner-img') {
                    document.getElementById('banner-img').style.backgroundImage = `url(${imgData})`;
                }
            };
            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        }

        window.onload = () => {
            // 初始化头像为用户上传的默认图
            // 注意：在实际浏览器环境中，如果图片不存在会显示空白，这里我们直接注入路径
            const initAva = `url('${DEFAULT_AVATAR_PATH}')`;
            document.documentElement.style.setProperty('--default-avatar', initAva);
            
            document.getElementById('avatar-img').style.backgroundImage = initAva;
            document.getElementById('k-my-ava').style.backgroundImage = initAva;
            
            // 初始化背景图（保持原来的）
            document.getElementById('banner-img').style.backgroundImage = `url('https://images.unsplash.com/photo-1518173946687-a4c8a9b749f5?q=80&w=1000')`;
        }
    </script>
</body>
</html>
